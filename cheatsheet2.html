            "function LoginForm() {",
            "  const {",
            "    register,           // подключить инпут к форме",

            "import { useForm } from 'react-hook-form'",
            "import { zodResolver } from '@hookform/resolvers/zod'",
            "import { z } from 'zod'",
            "",
            "// 1. Описываем схему валидации",
            "const schema = z.object({",
            "  name: z.string()",

            "",

            "type FormData = z.infer<typeof schema>",
            "",

            "  const { register, handleSubmit, formState: { errors } } = useForm<FormData>({",

// 2. ERROR BOUNDARIES
// ════════════════════════════════════════════════════════════
{
  id: "errors", label: "Error Boundaries", color: "#ef4444",
  groups: [
    {
      label: "Основы",
      cards: [
        {
          title: "Что такое Error Boundary и зачем",
          code: [
            "// Без Error Boundary — одна ошибка в компоненте",
            "// ронит ВСЁ приложение (белый экран)",
            "",
            "// С Error Boundary — ошибка изолирована в своей зоне",
            "// Остальное приложение продолжает работать",
            "",
            "// Error Boundary ЛОВИТ:",
            "// ✅ Ошибки в render()",
            "// ✅ Ошибки в lifecycle-методах",
            "// ✅ Ошибки в дочерних компонентах",
            "",
            "// Error Boundary НЕ ЛОВИТ:",
            "// ❌ Ошибки в event handlers (onClick, onChange) — try/catch",
            "// ❌ Асинхронные ошибки (setTimeout, fetch) — try/catch",
            "// ❌ Ошибки в самом Error Boundary",
            "// ❌ Ошибки при Server-Side Rendering"
          ].join("\n"),
          noteType: "danger",
          note: "Error Boundary — это классовый компонент. Хуков для этого нет (пока). Но можно использовать библиотеку react-error-boundary."
        },
        {
          title: "Написать свой Error Boundary (класс)",
          code: [
            "import React, { Component, ReactNode } from 'react'",
            "",
            "interface Props {",
            "  children:  ReactNode",
            "  fallback?: ReactNode  // что показать при ошибке",
            "}",
            "",
            "interface State {",
            "  hasError: boolean",
            "  error:    Error | null",
            "}",
            "",
            "class ErrorBoundary extends Component<Props, State> {",
            "  state: State = { hasError: false, error: null }",
            "",
            "  // Вызывается при ошибке — обновляет state для рендера fallback",
            "  static getDerivedStateFromError(error: Error): State {",
            "    return { hasError: true, error }",
            "  }",
            "",
            "  // Вызывается после — можно отправить ошибку в Sentry и т.д.",
            "  componentDidCatch(error: Error, info: React.ErrorInfo) {",
            "    console.error('Поймана ошибка:', error, info.componentStack)",
            "    // Sentry.captureException(error)",
            "  }",
            "",
            "  render() {",
            "    if (this.state.hasError) {",
            "      return this.props.fallback ?? (",
            "        <div>",
            "          <h2>Что-то пошло не так</h2>",
            "          <p>{this.state.error?.message}</p>",
            "          <button onClick={() => this.setState({ hasError: false, error: null })}> ",
            "            Попробовать снова",
            "          </button>",
            "        </div>",
            "      )",
            "    }",
            "    return this.props.children",
            "  }",
            "}",
            "",
            "export default ErrorBoundary"
          ].join("\n")
        },
        {
          title: "react-error-boundary — библиотека (рекомендуется)",
          code: [
            "// npm install react-error-boundary",
            "import { ErrorBoundary, useErrorBoundary } from 'react-error-boundary'",
            "",
            "// Компонент для отображения ошибки",
            "function ErrorFallback({ error, resetErrorBoundary }: {",
            "  error: Error",
            "  resetErrorBoundary: () => void",
            "}) {",
            "  return (",
            "    <div role='alert'>",
            "      <p>Что-то пошло не так:</p>",
            "      <pre>{error.message}</pre>",
            "      <button onClick={resetErrorBoundary}>Попробовать снова</button>",
            "    </div>",
            "  )",
            "}",
            "",
            "// Использование",
            "function App() {",
            "  return (",
            "    <ErrorBoundary",
            "      FallbackComponent={ErrorFallback}",
            "      onError={(error, info) => console.error(error, info)}",
            "      onReset={() => {/* очистить state или перезагрузить данные */}}",
            "    >",
            "      <Dashboard />",
            "    </ErrorBoundary>",
            "  )",
            "}",
            "",
            "// Бросить ошибку из хука (для поимки ErrorBoundary)",
            "function SomeComponent() {",
            "  const { showBoundary } = useErrorBoundary()",
            "",
            "  const handleClick = async () => {",
            "    try {",
            "      await riskyOperation()",
            "    } catch (error) {",
            "      showBoundary(error)  // ← пробросить в ErrorBoundary",
            "    }",
            "  }",
            "}"
          ].join("\n"),
          noteType: "success",
          note: "react-error-boundary — официально рекомендованная библиотека. Добавляет хуки и избавляет от написания классовых компонентов вручную."
        }
      ]
    },
    {
      label: "Стратегия расстановки",
      cards: [
        {
          title: "Где расставлять ErrorBoundary",
          code: [
            "// Стратегия 1 — один глобальный (минимум)",
            "// Ловит всё но показывает пустой экран",
            "ReactDOM.createRoot(root).render(",
            "  <ErrorBoundary FallbackComponent={GlobalError}>",

            "  </ErrorBoundary>",

            "",
            "// Стратегия 2 — по страницам (хорошо)",
            "// Ошибка на одной странице не ломает навигацию",
            "<Routes>",
            "  <Route path='/' element={",
            "    <ErrorBoundary FallbackComponent={PageError}>",
            "      <HomePage />",
            "    </ErrorBoundary>",
            "  } />",
            "</Routes>",
            "",
            "// Стратегия 3 — по виджетам (лучше всего)",
            "// Виджет упал — остальное работает",
            "function Dashboard() {",

            "    <div>",

            "        <SalesChart />",
            "      </ErrorBoundary>",
            "      <ErrorBoundary FallbackComponent={WidgetError}>",
            "        <UserStats />",
            "      </ErrorBoundary>",
            "      <ErrorBoundary FallbackComponent={WidgetError}>",
            "        <RecentActivity />",
            "      </ErrorBoundary>",
            "    </div>",
            "  )",
            "}"
          ].join("\n"),
          noteType: "info",
          note: "Лучшая стратегия: глобальный + по страницам + по критичным виджетам. Чем мельче граница — тем меньше пользователь теряет при ошибке."
        }
      ]
    }
  ]
},

            "function useLocalStorage<T>(key: string, initialValue: T) {",
            "  const [value, setValue] = useState<T>(() => {",
            "    // Инициализируем из localStorage (функция — ленивая инициализация)",
            "    try {",
            "      const item = localStorage.getItem(key)",
            "      return item ? JSON.parse(item) : initialValue",
            "    } catch {",
            "      return initialValue",
            "    }",
            "  })",
            "",
            "  const set = (newValue: T | ((prev: T) => T)) => {",
            "    try {",
            "      const val = newValue instanceof Function ? newValue(value) : newValue",
            "      setValue(val)",
            "      localStorage.setItem(key, JSON.stringify(val))",
            "    } catch (e) {",
            "      console.error(e)",
            "    }",
            "  }",
            "",
            "  const remove = () => {",
            "    setValue(initialValue)",
            "    localStorage.removeItem(key)",
            "  }",
            "",
            "  return [value, set, remove] as const",
            "}",

            "  useEffect(() => {",
            "    const timer = setTimeout(() => {",
            "      setDebouncedValue(value)",
            "    }, delay)",
            "",
            "    return () => clearTimeout(timer)  // сбрасываем при каждом изменении",
            "  }, [value, delay])",
            "",
            "  return debouncedValue",
            "}",
            "",

            "  })",
            "}"

            "function useClickOutside<T extends HTMLElement>(callback: () => void) {",
            "  const ref = useRef<T>(null)",
            "",
            "  useEffect(() => {",
            "    const handler = (e: MouseEvent) => {",
            "      // Если клик был не внутри элемента — вызываем callback",
            "      if (ref.current && !ref.current.contains(e.target as Node)) {",
            "        callback()",
            "      }",
            "    }",
            "",
            "    document.addEventListener('mousedown', handler)",
            "    return () => document.removeEventListener('mousedown', handler)",
            "  }, [callback])",
            "",
            "  return ref",
            "}",
            "",
            "// Использование — закрыть дропдаун при клике вне",
            "function Dropdown() {",
            "  const [open, setOpen] = useState(false)",
            "  const ref = useClickOutside<HTMLDivElement>(() => setOpen(false))",
            "",
            "  return (",
            "    <div ref={ref}>",
            "      <button onClick={() => setOpen(o => !o)}>Открыть</button>",
            "      {open && <ul><li>Пункт 1</li><li>Пункт 2</li></ul>}",
            "    </div>",
            "  )",
            "}"
          ].join("\n")
        },
        {
          title: "usePrevious — предыдущее значение",
          code: [
            "function usePrevious<T>(value: T): T | undefined {",
            "  const ref = useRef<T>()              // useRef — не триггерит ре-рендер",
            "",
            "  useEffect(() => {",
            "    ref.current = value                // обновляется ПОСЛЕ рендера",
            "  })",
            "",
            "  return ref.current                  // возвращает значение ДО рендера",
            "}",
            "",
            "// Использование",
            "function Counter() {",
            "  const [count, setCount] = useState(0)",
            "  const prevCount = usePrevious(count)",
            "",
            "  return (",
            "    <p>Было: {prevCount} → Стало: {count}</p>",
            "  )",
            "}"
          ].join("\n")
        },
        {
          title: "useMediaQuery — адаптивность в JS",
          code: [
            "function useMediaQuery(query: string): boolean {",
            "  const [matches, setMatches] = useState(",
            "    () => window.matchMedia(query).matches",
            "  )",
            "",
            "  useEffect(() => {",
            "    const mql      = window.matchMedia(query)",
            "    const onChange = (e: MediaQueryListEvent) => setMatches(e.matches)",
            "",
            "    mql.addEventListener('change', onChange)",
            "    return () => mql.removeEventListener('change', onChange)",
            "  }, [query])",
            "",
            "  return matches",
            "}",
            "",
            "// Использование",
            "function Layout() {",
            "  const isMobile  = useMediaQuery('(max-width: 768px)')",
            "  const isDarkMode = useMediaQuery('(prefers-color-scheme: dark)')",
            "",
            "  return isMobile ? <MobileNav /> : <DesktopNav />",
            "}"
          ].join("\n")
        },
        {
          title: "useAsync — универсальный хук для асинхронных операций",
          code: [
            "interface AsyncState<T> {",
            "  data:      T | null",
            "  isLoading: boolean",
            "  error:     Error | null",
            "}",
            "",
            "function useAsync<T>(asyncFn: () => Promise<T>, deps: any[] = []) {",
            "  const [state, setState] = useState<AsyncState<T>>({",
            "    data: null, isLoading: true, error: null",
            "  })",
            "",
            "  useEffect(() => {",
            "    let cancelled = false           // флаг отмены",
            "",
            "    setState({ data: null, isLoading: true, error: null })",
            "",
            "    asyncFn()",
            "      .then(data => {",
            "        if (!cancelled) setState({ data, isLoading: false, error: null })",
            "      })",
            "      .catch(error => {",
            "        if (!cancelled) setState({ data: null, isLoading: false, error })",
            "      })",
            "",
            "    return () => { cancelled = true }  // cleanup при размонтировании",
            "  }, deps)",
            "",
            "  return state",
            "}",
            "",
            "// Использование",
            "const { data, isLoading, error } = useAsync(",
            "  () => fetch('/api/posts').then(r => r.json()),",
            "  []",
            ")"
          ].join("\n")
        }
      ]
    }
  ]
},

            "  todos:      Todo[]",
            "  toggleTodo: (id: number) => void",
            "  updateText: (id: number, text: string) => void",
            "}",
            "",
            "export const useTodoStore = create<TodoStore>()(immer((set) => ({",
            "  todos: [],",
            "",
            "  toggleTodo: (id) => set((state) => {",
            "    // Можно мутировать state напрямую как в RTK",
            "    const todo = state.todos.find(t => t.id === id)",
            "    if (todo) todo.done = !todo.done",
            "  }),",
            "",
            "  updateText: (id, text) => set((state) => {",
            "    const todo = state.todos.find(t => t.id === id)",
            "    if (todo) todo.text = text",
            "  }),",
            "}))"
          ].join("\n")
        }
      ]
    }
  ]
},

// ─── рендер ──────────────────────────────────────────────────────────────────

let activeId = "forms";

function render() {
  const tabsEl    = document.getElementById("tabs");
  const contentEl = document.getElementById("content");

  tabsEl.innerHTML = TABS.map(t => `
    <button class="tab ${t.id === activeId ? "active" : ""}" data-id="${t.id}"
      style="color:${t.id === activeId ? t.color : "#8b949e"};
             border-bottom-color:${t.id === activeId ? t.color : "transparent"}">
      ${t.label}
    </button>
  `).join("");

  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => { activeId = btn.dataset.id; render(); });
  });

  const tab = TABS.find(t => t.id === activeId);

  contentEl.innerHTML = tab.groups.map(group => {
    const cards = group.cards.map((card, i) => {
      const noteHtml = card.note
        ? `<div class="note ${card.noteType || ""}">${card.note}</div>`
        : "";
      return `
        <div class="card">
          <div class="card-header">
            <span class="dot" style="background:${tab.color}"></span>
            ${card.title}
          </div>
          <div class="code-wrap">
            <pre id="c-${group.label}-${i}">${escHtml(card.code)}</pre>
            <button class="copy-btn" data-group="${group.label}" data-idx="${i}">copy</button>
            ${noteHtml}
          </div>
        </div>`;
    }).join("");
    return `<div class="section-label">${group.label}</div>${cards}`;
  }).join("");

  contentEl.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const group = tab.groups.find(g => g.label === btn.dataset.group);
      copyText(group.cards[parseInt(btn.dataset.idx)].code);
      btn.textContent = "✓ ok";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("ok"); }, 1500);
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function copyText(text) {
  try { if (navigator.clipboard) { navigator.clipboard.writeText(text).catch(()=>{}); return; } } catch(e) {}
  try {
    const el = document.createElement("textarea");
    el.value = text; el.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(el); el.select();
    document.execCommand("copy"); document.body.removeChild(el);
  } catch(e) {}
}

render();
