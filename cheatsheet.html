            "// Пользователь видит: пустой экран → skeleton → данные",
            "",
            "function PostPage() {                    // BrowserRouter подход",
            "  const { id } = useParams()",
            "  const [post, setPost] = useState(null)",
            "  const [loading, setLoading] = useState(true)",
            "",
            "  useEffect(() => {                      // запрос ПОСЛЕ рендера",
            "    fetch('/api/posts/' + id)",
            "      .then(r => r.json())",
            "      .then(data => { setPost(data); setLoading(false) })",
            "  }, [id])",
            "",
            "  if (loading) return <Spinner />",
            "  return <h1>{post.title}</h1>",
            "}",
            "",
            "// createBrowserRouter — loader грузит данные ДО рендера",
            "// Компонент рендерится уже с данными — нет пустого экрана",
            "",
            "// router.tsx",
            "{",
            "  path: '/posts/:id',",
            "  element: <PostPage />,",
            "  loader: ({ params }) =>              // запрос ПЕРЕД рендером",
            "    fetch('/api/posts/' + params.id).then(r => r.json()),",
            "}",
            "",
            "function PostPage() {                  // createBrowserRouter подход",
            "  const post = useLoaderData()         // данные уже есть",
            "  return <h1>{post.title}</h1>         // никакого loading state!",
            "}"
          ].join("\n"),
          noteType: "success",
          note: "Это главная причина использовать createBrowserRouter. Данные загружаются параллельно с JS-бандлом страницы — пользователь ждёт меньше."

          title: "Полная структура реального приложения",

            "  const [error,     setError]     = useState<string | null>(null)",

            "      .catch(e => { setError(e.message); setIsLoading(false) })",
            "  }, [url])",

            "  return { data, isLoading, error }",

            "const user2 = UserSchema.safeParse(data)   // возвращает { success, data, error }",
            "",
            "if (user2.success) {",
            "  console.log(user2.data.name)  // безопасно",
            "}"
          ].join("\n"),
          noteType: "success",
          note: "Zod — стандарт для валидации данных в TypeScript-проектах. Особенно важен для данных от API — нельзя доверять что сервер вернёт правильный тип."
        }
      ]
    },
    {
      label: "Производительность",
      cards: [
        {
          title: "memo, useMemo, useCallback — когда использовать",
          code: [
            "import { memo, useMemo, useCallback } from 'react'",
            "",
            "// memo — не перерендеривать если props не изменились",
            "// ✅ Используй для 'тяжёлых' компонентов или больших списков",
            "const PostCard = memo(function PostCard({ post }: { post: Post }) {",
            "  return <div>{post.title}</div>",
            "})",
            "",
            "// useMemo — кешировать результат вычисления",
            "// ✅ Только для дорогих вычислений",
            "const sortedPosts = useMemo(",
            "  () => [...posts].sort((a, b) => b.date - a.date),",
            "  [posts]  // пересчитать только если posts изменился",
            ")",
            "",
            "// useCallback — стабильная ссылка на функцию",
            "// ✅ Нужен когда функция передаётся в memo-компонент",
            "const handleDelete = useCallback(",
            "  (id: number) => dispatch(deletePost(id)),",
            "  [dispatch]",
            ")",
            "",
            "// ❌ НЕ нужно использовать везде!",
            "// memo/useMemo/useCallback стоят памяти и времени.",
            "// Применяй только при реальной проблеме производительности."
          ].join("\n"),
          noteType: "danger",
          note: "Преждевременная оптимизация — корень зла. Не оборачивай всё в memo/useMemo/useCallback по умолчанию. Сначала измерь проблему через React DevTools Profiler."
        },
        {
          title: "Lazy loading — загрузка страниц по требованию",
          code: [
            "import { lazy, Suspense } from 'react'",
            "",
            "// Страницы загружаются только когда пользователь на них переходит",
            "const HomePage    = lazy(() => import('./pages/HomePage'))",
            "const PostPage    = lazy(() => import('./pages/PostPage'))",
            "const ProfilePage = lazy(() => import('./pages/ProfilePage'))",
            "",
            "// Suspense — показывает fallback пока страница загружается",
            "function App() {",
            "  return (",
            "    <Suspense fallback={<PageLoader />}>",
            "      <Routes>",
            "        <Route path='/'        element={<HomePage />} />",
            "        <Route path='/posts/:id' element={<PostPage />} />",
            "        <Route path='/profile' element={<ProfilePage />} />",
            "      </Routes>",
            "    </Suspense>",
            "  )",
            "}",
            "",
            "// ✅ Начальный bundle становится значительно меньше"
          ].join("\n"),
          noteType: "success",
          note: "Lazy loading страниц — обязательная практика для production. Без неё весь код грузится при первом открытии сайта."
        }
      ]
    }
  ]
}

]; // end TABS

// ─── рендер ─────────────────────────────────────────────────────────────────

let activeId = "router";

function render() {
  const tabsEl    = document.getElementById("tabs");
  const contentEl = document.getElementById("content");

  tabsEl.innerHTML = TABS.map(t => `
    <button class="tab ${t.id === activeId ? 'active' : ''}" data-id="${t.id}"
      style="color:${t.id === activeId ? t.color : '#8b949e'};
             border-bottom-color:${t.id === activeId ? t.color : 'transparent'}">
      ${t.label}
    </button>
  `).join("");

  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => { activeId = btn.dataset.id; render(); });
  });

  const tab = TABS.find(t => t.id === activeId);

  contentEl.innerHTML = tab.groups.map(group => {
    const cards = group.cards.map((card, i) => {
      const noteHtml = card.note
        ? `<div class="note ${card.noteType || ''}">${card.note}</div>`
        : "";
      return `
        <div class="card">
          <div class="card-header">
            <span class="dot" style="background:${tab.color}"></span>
            ${card.title}
          </div>
          <div class="code-wrap">
            <pre id="code-${group.label}-${i}">${escHtml(card.code)}</pre>
            <button class="copy-btn" data-group="${group.label}" data-idx="${i}">copy</button>
            ${noteHtml}
          </div>
        </div>`;
    }).join("");

    return `<div class="section-label">${group.label}</div>${cards}`;
  }).join("");

  contentEl.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const gLabel = btn.dataset.group;
      const idx    = parseInt(btn.dataset.idx);
      const group  = tab.groups.find(g => g.label === gLabel);
      copyText(group.cards[idx].code);
      btn.textContent = "✓ ok";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("ok"); }, 1500);
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function copyText(text) {
  try { if (navigator.clipboard) { navigator.clipboard.writeText(text).catch(()=>{}); return; } } catch(e) {}
  try {
    const el = document.createElement("textarea");
    el.value = text; el.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(el); el.select();
    document.execCommand("copy"); document.body.removeChild(el);
  } catch(e) {}
}

render();
</script>
</body>
