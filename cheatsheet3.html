// 1. AXIOS
// ════════════════════════════════════════════════════════════
{
  id: "axios", label: "Axios", color: "#5a67d8",
  groups: [
    {
      label: "Установка и базовое использование",
      cards: [
        {
          title: "Установка",
          code: "npm install axios"
        },
        {
          title: "Axios vs fetch — почему используют Axios",
          code: [
            "// fetch — нативный, но много ручной работы",
            "const res = await fetch('/api/posts')",
            "if (!res.ok) throw new Error('Ошибка ' + res.status)  // вручную!",
            "const data = await res.json()                          // вручную!",
            "",
            "// Axios — удобнее в реальных проектах",
            "const { data } = await axios.get('/api/posts')",
            "// ✅ Автоматически парсит JSON",
            "// ✅ Бросает ошибку при статусах 4xx/5xx автоматически",
            "// ✅ Интерцепторы — добавить токен ко всем запросам",
            "// ✅ Автоматическая отмена запросов (CancelToken / AbortController)",
            "// ✅ Удобная обработка ошибок через axios.isAxiosError()",
            "// ✅ Поддержка прогресса загрузки файлов"
          ].join("\n"),
          noteType: "info",
          note: "В небольших проектах fetch вполне достаточен. Axios выигрывает когда нужны интерцепторы, централизованная обработка ошибок, загрузка файлов."
        },
        {
          title: "Базовые запросы",
          code: [
            "import axios from 'axios'",
            "",
            "// GET",
            "const { data } = await axios.get<Post[]>('/api/posts')",
            "",
            "// GET с параметрами — автоматически строит ?page=1&limit=10",
            "const { data } = await axios.get<Post[]>('/api/posts', {",
            "  params: { page: 1, limit: 10, sort: 'date' },",
            "})",
            "",
            "// POST",
            "const { data } = await axios.post<Post>('/api/posts', {",
            "  title: 'Новый пост',",
            "  body:  'Содержание',",
            "})",
            "",
            "// PUT — полное обновление",
            "const { data } = await axios.put<Post>('/api/posts/1', updatedPost)",
            "",
            "// PATCH — частичное обновление",
            "const { data } = await axios.patch<Post>('/api/posts/1', { title: 'Новый заголовок' })",
            "",
            "// DELETE",
            "await axios.delete('/api/posts/1')"
          ].join("\n")
        }
      ]
    },
    {
      label: "Axios Instance — главный паттерн",
      cards: [
        {
          title: "Создать instance с базовой конфигурацией",
          code: [
            "// shared/lib/axios.ts — один instance на весь проект",
            "import axios from 'axios'",
            "",
            "export const api = axios.create({",
            "  baseURL: import.meta.env.VITE_API_URL,  // https://api.myapp.com",
            "  timeout: 10_000,                         // 10 секунд",
            "  headers: {",
            "    'Content-Type': 'application/json',",
            "  },",
            "})",
            "",
            "// Использование — не нужно каждый раз писать полный URL",
            "const { data } = await api.get('/posts')          // GET https://api.myapp.com/posts",
            "const { data } = await api.post('/posts', body)   // POST https://api.myapp.com/posts"
          ].join("\n"),
          noteType: "success",
          note: "Всегда создавай instance вместо использования axios напрямую. Так базовый URL и заголовки задаются один раз, а не в каждом запросе."
        },
        {
          title: "Интерцепторы — interceptors",
          code: [
            "// shared/lib/axios.ts",
            "import axios from 'axios'",
            "import { store } from '../../app/store'",
            "",
            "export const api = axios.create({",
            "  baseURL: import.meta.env.VITE_API_URL,",
            "})",
            "",
            "// REQUEST интерцептор — добавляет токен к каждому запросу",
            "api.interceptors.request.use(",
            "  (config) => {",
            "    const token = store.getState().auth.token",
            "    if (token) {",
            "      config.headers.Authorization = 'Bearer ' + token",
            "    }",
            "    return config",
            "  },",
            "  (error) => Promise.reject(error)",
            ")",
            "",
            "// RESPONSE интерцептор — централизованная обработка ошибок",
            "api.interceptors.response.use(",
            "  (response) => response,  // 2xx — просто возвращаем",
            "  (error) => {",
            "    if (error.response?.status === 401) {",
            "      store.dispatch(logout())   // разлогинить",
            "      window.location.href = '/login'",
            "    }",
            "    if (error.response?.status === 403) {",
            "      window.location.href = '/403'",
            "    }",
            "    // Показать глобальное уведомление об ошибке",
            "    if (error.response?.status >= 500) {",
            "      store.dispatch(showToast({ message: 'Ошибка сервера', type: 'error' }))",
            "    }",
            "    return Promise.reject(error)",
            "  }",
            ")"
          ].join("\n"),
          noteType: "success",
          note: "Интерцепторы — главная причина использовать Axios. Добавить токен, обработать 401, показать toast — всё в одном месте, а не в каждом запросе."
        },
        {
          title: "Обработка ошибок Axios",
          code: [
            "import axios from 'axios'",
            "",
            "try {",
            "  const { data } = await api.get('/posts')",
            "} catch (error) {",
            "  // axios.isAxiosError() — type guard для ошибок Axios",
            "  if (axios.isAxiosError(error)) {",
            "    const status  = error.response?.status",
            "    const message = error.response?.data?.message",
            "",
            "    if (status === 404) console.log('Не найдено')",
            "    if (status === 422) console.log('Ошибка валидации:', message)",
            "    if (!error.response) console.log('Нет соединения — сетевая ошибка')",
            "  } else {",
            "    // Не Axios-ошибка — JS-ошибка",
            "    console.log('Неизвестная ошибка:', error)",
            "  }",
            "}",
            "",
            "// Типизированный ответ ошибки от сервера",
            "interface ApiError {",
            "  message: string",
            "  errors?: Record<string, string[]>",
            "}",
            "",
            "if (axios.isAxiosError<ApiError>(error)) {",
            "  const fieldErrors = error.response?.data?.errors",
            "  // fieldErrors: { email: ['уже занят'], name: ['слишком короткое'] }",
            "}"
          ].join("\n")
        },
        {
          title: "Загрузка файлов с прогрессом",
          code: [
            "async function uploadFile(file: File, onProgress: (pct: number) => void) {",
            "  const formData = new FormData()",
            "  formData.append('file', file)",
            "",
            "  const { data } = await api.post('/upload', formData, {",
            "    headers: { 'Content-Type': 'multipart/form-data' },",
            "    onUploadProgress: (progressEvent) => {",
            "      const total   = progressEvent.total ?? 1",
            "      const percent = Math.round((progressEvent.loaded / total) * 100)",
            "      onProgress(percent)",
            "    },",
            "  })",
            "",
            "  return data",
            "}",
            "",
            "// Использование в компоненте",
            "function FileUpload() {",
            "  const [progress, setProgress] = useState(0)",
            "",
            "  const handleFile = async (e: React.ChangeEvent<HTMLInputElement>) => {",
            "    const file = e.target.files?.[0]",
            "    if (!file) return",
            "    await uploadFile(file, setProgress)",
            "  }",
            "",
            "  return (",
            "    <div>",
            "      <input type='file' onChange={handleFile} />",
            "      {progress > 0 && <p>Загрузка: {progress}%</p>}",
            "    </div>",
            "  )",
            "}"
          ].join("\n")
        },
        {
          title: "Отмена запросов — AbortController",
          code: [
            "// В useEffect — отменяем запрос при размонтировании",
            "useEffect(() => {",
            "  const controller = new AbortController()",
            "",
            "  api.get('/posts', { signal: controller.signal })",
            "    .then(({ data }) => setPosts(data))",
            "    .catch(error => {",
            "      if (!axios.isCancel(error)) setError(error)",
            "    })",
            "",
            "  return () => controller.abort()  // отменяем при размонтировании",
            "}, [])",
            "",
            "// Отмена при новом вводе в поиске",
            "const controllerRef = useRef<AbortController>()",
            "",
            "const handleSearch = async (query: string) => {",
            "  // Отменяем предыдущий запрос",
            "  controllerRef.current?.abort()",
            "  controllerRef.current = new AbortController()",
            "",
            "  const { data } = await api.get('/search', {",
            "    params: { q: query },",
            "    signal: controllerRef.current.signal,",
            "  })",
            "  setResults(data)",
            "}"
          ].join("\n"),
          noteType: "info",
          note: "Отмена запросов особенно важна в поиске — без неё при быстром вводе приходят ответы не в том порядке и UI показывает устаревшие данные (race condition)."
        }
      ]
    }
  ]
},

// 2. TANSTACK QUERY (React Query)
// ════════════════════════════════════════════════════════════
{
  id: "query", label: "TanStack Query", color: "#ef4444",
  groups: [
    {
      label: "Установка и базовая настройка",
      cards: [
        {
          title: "Установка",
          code: [
            "npm install @tanstack/react-query",
            "npm install -D @tanstack/react-query-devtools  // DevTools"
          ].join("\n")
        },
        {
          title: "TanStack Query vs RTK Query — что выбрать",
          code: [
            "// RTK Query",
            "// ✅ Уже внутри Redux Toolkit — не нужен отдельный пакет",
            "// ✅ Хранит данные в Redux store — DevTools, time travel",
            "// ✅ Лучше когда уже используешь Redux",
            "// ❌ Привязан к Redux",
            "",
            "// TanStack Query",
            "// ✅ Независим — работает без Redux",
            "// ✅ Более гибкий и богатый API",
            "// ✅ Infinite scroll, optimistic updates, background refetch",
            "// ✅ Отличные DevTools",
            "// ✅ Работает с любым HTTP-клиентом (fetch, axios, graphql)",
            "// ✅ Лучший выбор если НЕ используешь Redux",
            "",
            "// Правило: используешь Redux → RTK Query",
            "//          не используешь Redux → TanStack Query + Zustand"
          ].join("\n"),
          noteType: "info",
          note: "В реальных проектах встречаются оба варианта. TanStack Query сейчас популярнее для новых проектов без Redux."
        },
        {
          title: "Настройка — QueryClient и Provider",
          code: [
            "// main.tsx",
            "import { QueryClient, QueryClientProvider } from '@tanstack/react-query'",
            "import { ReactQueryDevtools } from '@tanstack/react-query-devtools'",
            "",
            "const queryClient = new QueryClient({",
            "  defaultOptions: {",
            "    queries: {",
            "      staleTime:          1000 * 60 * 5,  // данные свежие 5 минут",
            "      gcTime:             1000 * 60 * 10, // хранить в кеше 10 минут",
            "      retry:              2,               // повторить 2 раза при ошибке",
            "      refetchOnWindowFocus: false,         // не перезапрашивать при фокусе",
            "    },",
            "  },",
            "})",
            "",
            "ReactDOM.createRoot(document.getElementById('root')!).render(",
            "  <QueryClientProvider client={queryClient}>",
            "    <App />",
            "    {/* DevTools — только в разработке */}",
            "    <ReactQueryDevtools initialIsOpen={false} />",
            "  </QueryClientProvider>",
            ")"
          ].join("\n"),
          noteType: "success",
          note: "staleTime — ключевая настройка. Пока данные 'свежие' — повторного запроса нет. По умолчанию staleTime=0, т.е. данные всегда устаревшие и перезапрашиваются при каждом монтировании."
        }
      ]
    },
    {
      label: "useQuery — получение данных",
      cards: [
        {
          title: "useQuery — базовое использование",
          code: [
            "import { useQuery } from '@tanstack/react-query'",
            "import { api } from '../shared/lib/axios'",
            "",
            "// queryFn — любая async функция которая возвращает данные",
            "// queryKey — уникальный ключ для кеша (как тег в RTK Query)",
            "",
            "function PostsList() {",
            "  const {",
            "    data: posts,",
            "    isLoading,",
            "    isFetching,",
            "    isError,",
            "    error,",
            "    refetch,",
            "  } = useQuery({",
            "    queryKey: ['posts'],             // ключ кеша — массив",
            "    queryFn:  async () => {",
            "      const { data } = await api.get<Post[]>('/posts')",
            "      return data",
            "    },",
            "  })",
            "",
            "  if (isLoading) return <p>Загрузка...</p>",
            "  if (isError)   return <p>Ошибка: {error.message}</p>",
            "",
            "  return (",
            "    <ul>",
            "      {posts?.map(p => <li key={p.id}>{p.title}</li>)}",
            "    </ul>",
            "  )",
            "}"
          ].join("\n")
        },
        {
          title: "queryKey — правила формирования ключей",
          code: [
            "// queryKey — массив. Определяет что именно кешируется.",
            "// Разные ключи = разные записи в кеше",
            "",
            "// Список всех постов",
            "queryKey: ['posts']",
            "",
            "// Конкретный пост по id",
            "queryKey: ['posts', 42]",
            "",
            "// Посты с фильтрами — разные фильтры = разный кеш",
            "queryKey: ['posts', { page: 1, status: 'published', sort: 'date' }]",
            "",
            "// Вложенный ресурс — комментарии конкретного поста",
            "queryKey: ['posts', postId, 'comments']",
            "",
            "// При изменении любого элемента ключа — запрос перезапустится",
            "const { data } = useQuery({",
            "  queryKey: ['posts', { page, sort }],  // перезапросит при смене page или sort",
            "  queryFn:  () => api.get('/posts', { params: { page, sort } }).then(r => r.data),",
            "})"
          ].join("\n"),
          noteType: "success",
          note: "queryKey это как адрес в кеше. Включай в ключ всё от чего зависит запрос (id, фильтры, параметры). Тогда кеш работает правильно автоматически."
        },
        {
          title: "Опции useQuery",
          code: [
            "const { data } = useQuery({",
            "  queryKey: ['posts', id],",
            "  queryFn:  () => api.get('/posts/' + id).then(r => r.data),",
            "",
            "  // Не выполнять запрос если id не задан",
            "  enabled: Boolean(id),",
            "",
            "  // Данные считаются свежими 5 минут (не будет лишних запросов)",
            "  staleTime: 1000 * 60 * 5,",
            "",
            "  // Автообновление каждые 30 секунд",
            "  refetchInterval: 30_000,",
            "",
            "  // Не обновлять пока вкладка неактивна",
            "  refetchIntervalInBackground: false,",
            "",
            "  // Вернуть кешированные данные пока грузятся новые",
            "  placeholderData: [],",
            "",
            "  // Обработчики",
            "  onSuccess: (data) => console.log('Загружено:', data),",
            "  onError:   (err)  => console.error('Ошибка:', err),",
            "",
            "  // Выбрать/трансформировать данные",
            "  select: (data) => data.filter(p => p.published),",
            "})"
          ].join("\n")
        },
        {
          title: "Зависимые запросы — один зависит от другого",
          code: [
            "// Сначала загружаем пользователя, потом его посты",
            "function UserPosts({ userId }: { userId: number }) {",
            "  // 1. Загружаем пользователя",
            "  const { data: user } = useQuery({",
            "    queryKey: ['user', userId],",
            "    queryFn:  () => api.get('/users/' + userId).then(r => r.data),",
            "  })",
            "",
            "  // 2. Загружаем посты только когда user загружен",
            "  const { data: posts } = useQuery({",
            "    queryKey: ['posts', { authorId: user?.id }],",
            "    queryFn:  () => api.get('/posts', { params: { authorId: user!.id } }).then(r => r.data),",
            "    enabled:  Boolean(user?.id),  // ← ключевая строка",
            "  })",
            "",
            "  return <div>...</div>",
            "}"
          ].join("\n")
        },
        {
          title: "Бесконечная прокрутка — useInfiniteQuery",
          code: [
            "import { useInfiniteQuery } from '@tanstack/react-query'",
            "",
            "function InfinitePosts() {",
            "  const {",
            "    data,            // { pages: [...], pageParams: [...] }",
            "    fetchNextPage,   // загрузить следующую страницу",
            "    hasNextPage,     // есть ли ещё страницы",
            "    isFetchingNextPage,",
            "  } = useInfiniteQuery({",
            "    queryKey: ['posts', 'infinite'],",
            "    queryFn: ({ pageParam = 1 }) =>",
            "      api.get('/posts', { params: { page: pageParam } }).then(r => r.data),",
            "",
            "    // Вернуть номер следующей страницы или undefined если страниц нет",

            "          opacity:    isLoading ? 0.5 : 1,",
            "          transition: 'opacity 0.2s',",
            "        }}",
            "      >",
            "        {/* Outlet — рендерит текущую дочернюю страницу */}",
            "        {/* Suspense вокруг Outlet — для lazy страниц */}",
            "        <Suspense fallback={<PageSkeleton />}>",
            "          <Outlet />",
            "        </Suspense>",
            "      </main>",
            "",
            "    </div>",
            "  )",
            "}"
          ].join("\n"),
          noteType: "info",
          note: "useNavigation.state='loading' срабатывает когда loader нового маршрута выполняется. Это именно то что нужно для прогресс-бара — не нужен никакой доп. state."
        },
        {
          title: "PostsPage — loader + useDeferredValue для фильтра",
          code: [
            "// pages/PostsPage.tsx",
            "// Данные из loader (уже готовы при рендере) +",
            "// useDeferredValue для клиентской фильтрации без подвисания",
            "",
            "import { useLoaderData } from 'react-router-dom'",
            "import { useState, useDeferredValue, memo } from 'react'",
            "",
            "interface Post { id: number; title: string; category: string }",
            "",
            "// memo обязателен — иначе useDeferredValue не работает",
            "const PostsList = memo(function PostsList({",
            "  posts,",
            "  filter,",
            "}: {",
            "  posts:  Post[]",
            "  filter: string",
            "}) {",
            "  const filtered = posts.filter(p =>",
            "    p.title.toLowerCase().includes(filter.toLowerCase())",
            "  )",
            "",
            "  return (",
            "    <ul>",
            "      {filtered.map(p => <li key={p.id}>{p.title}</li>)}",
            "    </ul>",
            "  )",
            "})",
            "",
            "export default function PostsPage() {",
            "  // Данные из loader — нет useEffect, нет isLoading",
            "  const posts = useLoaderData() as Post[]",
            "",
            "  const [filter, setFilter] = useState('')",
            "",
            "  // Фильтрация — несрочное обновление",
            "  // Инпут печатает мгновенно, список обновляется чуть позже",
            "  const deferredFilter = useDeferredValue(filter)",
            "  const isStale        = filter !== deferredFilter",
            "",
            "  return (",
            "    <div>",
            "      <h1 className='text-2xl font-bold mb-4'>",
            "        Посты ({posts.length})",
            "      </h1>",
            "",
            "      <input",
            "        value={filter}",
            "        onChange={e => setFilter(e.target.value)}",
            "        placeholder='Фильтр по названию...'",
            "        className='border rounded px-3 py-2 mb-4 w-full'",
            "      />",
            "",
            "      <div style={{ opacity: isStale ? 0.6 : 1, transition: 'opacity 0.15s' }}>",
            "        <PostsList posts={posts} filter={deferredFilter} />",
            "      </div>",
            "    </div>",
            "  )",
            "}"
          ].join("\n"),
          noteType: "success",
          note: "loader + useDeferredValue — отличная комбинация. loader загрузил данные с сервера до рендера. useDeferredValue делает клиентскую фильтрацию этих данных без подвисания."
        },
        {
          title: "Полная картина — кто за что отвечает",
          code: [
            "// Как все инструменты работают вместе в одном приложении:",
            "",
            "// 1. createBrowserRouter",
            "//    → Связывает URL с компонентами",
            "//    → loader грузит данные ДО рендера страницы",
            "//    → action обрабатывает отправку форм",
            "//    → errorElement ловит ошибки маршрута",
            "",
            "// 2. lazy + Suspense",
            "//    → lazy разбивает бандл — каждая страница отдельный chunk",
            "//    → Suspense показывает skeleton пока chunk загружается",
            "//    → Срабатывает только при ПЕРВОМ переходе на страницу",
            "//    → Повторные переходы — chunk уже в кеше браузера",
            "",
            "// 3. useNavigation (из react-router-dom)",
            "//    → state='loading' пока loader маршрута выполняется",
            "//    → Используй для прогресс-бара и затемнения контента",
            "//    → Работает автоматически — не нужен доп. state",
            "",
            "// 4. useTransition",
            "//    → Для КЛИЕНТСКИХ обновлений state которые тяжёлые",
            "//    → Переключение вкладок, смена активного раздела",
            "//    → НЕ нужен для loader (там useNavigation)",
            "",
            "// 5. useDeferredValue",
            "//    → Для КЛИЕНТСКОЙ фильтрации/сортировки загруженных данных",
            "//    → Инпут поиска/фильтра по уже загруженным данным",
            "//    → Требует memo на компоненте который принимает это значение",
            "",
            "// Порядок срабатывания при переходе /posts → /posts/42:",
            "//",
            "// [клик на ссылку]",
            "//      ↓",
            "// useNavigation.state = 'loading'   ← прогресс-бар появился",
            "//      ↓",
            "// loader('/posts/42') запущен        ← fetch данных поста",
            "//      ↓  (параллельно)",
            "// lazy(() => import('./PostDetail')) ← загрузка chunk-а",
            "//      ↓",
            "// loader завершён + chunk загружен",
            "//      ↓",
            "// useNavigation.state = 'idle'       ← прогресс-бар исчез",
            "// PostDetail рендерится с данными    ← нет пустого экрана"
          ].join("\n"),
          noteType: "info",
          note: "loader и lazy работают ПАРАЛЛЕЛЬНО — это ключевая оптимизация createBrowserRouter. Без loader данные начали бы грузиться только после загрузки chunk-а."
        }
      ]
    }
  ]
}

]; // end TABS

// ─── рендер ──────────────────────────────────────────────────────────────────
let activeId = "axios";

function render() {
  const tabsEl    = document.getElementById("tabs");
  const contentEl = document.getElementById("content");

  tabsEl.innerHTML = TABS.map(t => `
    <button class="tab ${t.id === activeId ? "active" : ""}" data-id="${t.id}"
      style="color:${t.id === activeId ? t.color : "#8b949e"};
             border-bottom-color:${t.id === activeId ? t.color : "transparent"}">
      ${t.label}
    </button>
  `).join("");

  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => { activeId = btn.dataset.id; render(); });
  });

  const tab = TABS.find(t => t.id === activeId);

  contentEl.innerHTML = tab.groups.map(group => {
    const cards = group.cards.map((card, i) => {
      const noteHtml = card.note
        ? `<div class="note ${card.noteType || ""}">${card.note}</div>`
        : "";
      return `
        <div class="card">
          <div class="card-header">
            <span class="dot" style="background:${tab.color}"></span>
            ${card.title}
          </div>
          <div class="code-wrap">
            <pre id="c-${i}">${escHtml(card.code)}</pre>
            <button class="copy-btn" data-group="${group.label}" data-idx="${i}">copy</button>
            ${noteHtml}
          </div>
        </div>`;
    }).join("");
    return `<div class="section-label">${group.label}</div>${cards}`;
  }).join("");

  contentEl.querySelectorAll(".copy-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const group = tab.groups.find(g => g.label === btn.dataset.group);
      copyText(group.cards[parseInt(btn.dataset.idx)].code);
      btn.textContent = "ok";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("ok"); }, 1500);
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function copyText(text) {
  try { if (navigator.clipboard) { navigator.clipboard.writeText(text).catch(() => {}); return; } } catch (e) {}
  try {
    const el = document.createElement("textarea");
    el.value = text;
    el.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(el);
    el.select();
    document.execCommand("copy");
    document.body.removeChild(el);
  } catch (e) {}
}

render();
</script>
